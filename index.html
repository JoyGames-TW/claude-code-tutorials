<style>
:root {
  --sidebar-width: 340px;
  --header-height: 48px;
  --bg: #f8f9fa;
  --sidebar-bg: #1e1e2e;
  --sidebar-text: #cdd6f4;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --accent: #89b4fa;
  --accent2: #a6e3a1;
  --content-bg: #ffffff;
  --text: #2e2e2e;
  --text-muted: #6c6c6c;
  --border: #e0e0e0;
  --code-bg: #f4f4f5;
  --scrollbar: #c0c0c0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  display: flex; height: 100vh; overflow: hidden;
  background: var(--bg); color: var(--text);
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-width); min-width: var(--sidebar-width);
  height: 100vh; background: var(--sidebar-bg); color: var(--sidebar-text);
  display: flex; flex-direction: column; overflow: hidden;
  transition: margin-left 0.25s ease;
}
#sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }

.sidebar-header {
  padding: 12px 16px; font-size: 15px; font-weight: 700;
  background: #181825; border-bottom: 1px solid #313244;
  display: flex; align-items: center; justify-content: space-between;
  min-height: var(--header-height);
}
.sidebar-header span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#toc {
  flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent;
}
#toc::-webkit-scrollbar { width: 5px; }
#toc::-webkit-scrollbar-thumb { background: #585b70; border-radius: 3px; }

.toc-unit { margin: 2px 0; }
.toc-unit-header {
  display: flex; align-items: center; padding: 6px 12px; cursor: pointer;
  font-size: 13.5px; font-weight: 600; color: var(--accent);
  user-select: none; border-radius: 0 6px 6px 0; margin-right: 6px;
}
.toc-unit-header:hover { background: var(--sidebar-hover); }
.toc-unit-header .arrow {
  font-size: 10px; margin-right: 6px; transition: transform 0.2s;
  display: inline-block; width: 14px; text-align: center;
}
.toc-unit-header .arrow.open { transform: rotate(90deg); }

.toc-section-header {
  display: flex; align-items: center; padding: 5px 12px 5px 28px;
  cursor: pointer; font-size: 13px; color: #bac2de; user-select: none;
}
.toc-section-header:hover { background: var(--sidebar-hover); }
.toc-section-header .arrow { font-size: 10px; margin-right: 6px; transition: transform 0.2s; display: inline-block; width: 14px; text-align: center; }
.toc-section-header .arrow.open { transform: rotate(90deg); }

.toc-children { overflow: hidden; transition: max-height 0.3s ease; }
.toc-children.collapsed { max-height: 0 !important; }

.toc-item {
  display: block; padding: 4px 12px 4px 42px; font-size: 12.5px;
  color: #a6adc8; text-decoration: none; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-radius: 0 6px 6px 0; margin-right: 6px;
}
.toc-item:hover { background: var(--sidebar-hover); color: #cdd6f4; }
.toc-item.active { background: var(--sidebar-active); color: var(--accent2); font-weight: 600; }
.toc-item .num { color: #6c7086; margin-right: 4px; font-size: 11px; }

/* ── Main ── */
#main {
  flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  min-width: 0;
}

#topbar {
  height: var(--header-height); min-height: var(--header-height);
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
#toggle-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  color: var(--text); padding: 4px 6px; border-radius: 4px;
}
#toggle-btn:hover { background: #e8e8e8; }
#breadcrumb { font-size: 13px; color: var(--text-muted); }
#breadcrumb span { color: var(--text); font-weight: 600; }

#content {
  flex: 1; overflow-y: auto; overflow-x: visible; padding: 24px 40px 48px;
  scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent;
}
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* ── Markdown Content ── */
.markdown-body { line-height: 1.75; }
.markdown-body h1 { font-size: 1.8em; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); color: #1a1a1a; }
.markdown-body h2 { font-size: 1.4em; margin: 32px 0 12px; color: #2a2a2a; }
.markdown-body h3 { font-size: 1.15em; margin: 24px 0 8px; color: #3a3a3a; }
.markdown-body h4 { font-size: 1.05em; margin: 16px 0 6px; }
.markdown-body p { margin: 8px 0; }
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
.markdown-body li { margin: 4px 0; }
.markdown-body a { color: #1a6fc4; text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body blockquote {
  border-left: 4px solid var(--accent); padding: 8px 16px;
  margin: 12px 0; background: #f0f4ff; border-radius: 0 6px 6px 0;
  color: #444;
}
.markdown-body code {
  background: var(--code-bg); padding: 2px 6px; border-radius: 3px;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 0.9em;
}
.markdown-body pre {
  background: #1e1e2e; color: #cdd6f4; padding: 16px 20px;
  border-radius: 8px; overflow-x: auto; margin: 12px 0;
  font-size: 0.88em; line-height: 1.5; position: relative;
}
.code-block-wrapper { position: relative; }
.copy-btn {
  position: absolute; top: 8px; right: 8px; z-index: 10;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #a6adc8; cursor: pointer; border-radius: 5px; padding: 5px 8px;
  font-size: 12px; line-height: 1; opacity: 0; transition: opacity 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.code-block-wrapper:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: rgba(255,255,255,0.15); color: #cdd6f4; }
.copy-btn.copied { color: var(--accent2); border-color: var(--accent2); }
.markdown-body pre code { background: none; padding: 0; color: inherit; }
.markdown-body table {
  border-collapse: collapse; width: 100%; margin: 12px 0;
  font-size: 0.92em;
}
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border); padding: 8px 12px; text-align: left;
}
.markdown-body th { background: #f4f5f7; font-weight: 600; }
.markdown-body tr:nth-child(even) { background: #fafafa; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.markdown-body strong { color: #1a1a1a; }
.markdown-body img { max-width: 100%; border-radius: 6px; }

/* ── Mermaid ── */
.markdown-body .mermaid {
  background: #fafbfc; border: 1px solid var(--border);
  border-radius: 8px; padding: 24px 16px; margin: 12px 0;
  text-align: center; overflow-x: auto;
}
.markdown-body .mermaid svg {

/* ── Welcome ── */
.welcome { text-align: center; padding: 60px 20px; }

.welcome .quick-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.welcome .quick-links a {

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: var(--text-muted); }
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid #e0e0e0;
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin: 0 auto 12px;

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 768px) {

  #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }
  #content { padding: 16px 16px 40px; }
}

// ═══════════════ BUILD TOC ═══════════════
const tocEl = document.getElementById('toc');

function buildTOC() {
  tocEl.innerHTML = '';

  // README link at top
  const readmeItem = document.createElement('a');
  readmeItem.className = 'toc-item';
  readmeItem.style.cssText = 'padding-left:12px;font-weight:600;color:#cdd6f4;';
  readmeItem.textContent = '課程總索引 (README)';
  readmeItem.dataset.file = 'README.md';
  readmeItem.addEventListener('click', () => loadDoc('README.md', '課程總索引'));
  tocEl.appendChild(readmeItem);

  tocTree.forEach(unit => {
    const unitDiv = document.createElement('div');
    unitDiv.className = 'toc-unit';

    // Unit header
    const unitHeader = document.createElement('div');
    unitHeader.className = 'toc-unit-header';
    unitHeader.innerHTML = `<span class="arrow open">▶</span> ${unit.title}`;
    unitHeader.addEventListener('click', () => toggleBlock(unitHeader, unitChildren));

    const unitChildren = document.createElement('div');
    unitChildren.className = 'toc-children';

    unit.sections.forEach(section => {
      const secHeader = document.createElement('div');
      secHeader.className = 'toc-section-header';
      secHeader.innerHTML = `<span class="arrow open">▶</span> ${section.title}`;

      const secChildren = document.createElement('div');
      secChildren.className = 'toc-children';

      section.items.forEach((item, idx) => {
        const a = document.createElement('a');
        a.className = 'toc-item';
        const num = `${section.id}-${idx + 1}`;
        a.innerHTML = `<span class="num">${num}</span> ${item.title}`;
        a.dataset.file = item.file;
        a.title = item.title;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadDoc(item.file, item.title);
          setActive(a);
        });
        secChildren.appendChild(a);
      });

      secHeader.addEventListener('click', () => toggleBlock(secHeader, secChildren));
      unitChildren.appendChild(secHeader);
      unitChildren.appendChild(secChildren);
    });

    unitDiv.appendChild(unitHeader);
    unitDiv.appendChild(unitChildren);
    tocEl.appendChild(unitDiv);
  });
}

function toggleBlock(header, children) {
  const arrow = header.querySelector('.arrow');
  const isOpen = arrow.classList.contains('open');
  if (isOpen) {
    arrow.classList.remove('open');
    children.classList.add('collapsed');
  } else {
    arrow.classList.add('open');
    children.classList.remove('collapsed');
  }
}

function setActive(el) {
  document.querySelectorAll('.toc-item.active').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}

        然後打開 <code>http://localhost:3000</code></p>
        <p style="margin-top:12px;"><b>方法三（VS Code 內建）</b><br>
        安裝 <b>Live Preview</b> 擴充功能，點擊右下角「Go Live」</p>
      </div>
    </div>`;
    return;
  }

  try {
    const resp = await fetch(BASE + filename);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    let md = await resp.text();
    renderMarkdown(md, title);
  } catch (err) {
    contentEl.innerHTML = `<div class="loading"><p>❌ 無法載入文件：${filename}</p><p style="font-size:0.85em;color:var(--text-muted)">${err.message}</p></div>`;
  }
}

function renderMarkdown(md, title) {
  // Configure marked
  marked.setOptions({
    breaks: true,
    gfm: true
  });

  // Custom renderer to handle Mermaid code blocks
  const renderer = new marked.Renderer();
  renderer.code = function(code, lang) {
    if (lang === 'mermaid') {
      const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
      return '<div class="mermaid" id="' + id + '">' + escapeHTML(code) + '</div>';
    }
    // For other code, wrap in container with copy button
    var escaped = escapeHTML(code);
    var codeHtml = lang
      ? '<pre><code class="language-' + lang + '">' + escaped + '</code></pre>'
      : '<pre><code>' + escaped + '</code></pre>';
    return '<div class="code-block-wrapper">' + codeHtml +
      '<button class="copy-btn" title="複製程式碼" onclick="copyCodeBlock(this)">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
      '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 複製</button></div>';
  };

  marked.setOptions({ renderer });

  let html = marked.parse(md);

  // Wrap in markdown-body
  contentEl.innerHTML = `<div class="markdown-body">${html}</div>`;
  pageTitleEl.textContent = title || '';

  // Render Mermaid diagrams
  renderMermaidDiagrams();

  // Scroll to top
  contentEl.scrollTop = 0;
}

function escapeHTML(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════ COPY CODE BLOCK ═══════════════
function copyCodeBlock(btn) {
  var wrapper = btn.closest('.code-block-wrapper');
  var code = wrapper.querySelector('code');
  if (!code) return;
  var text = code.textContent;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showCopied(btn);
    }).catch(function() {
      fallbackCopy(btn, text);
    });
  } else {
    fallbackCopy(btn, text);
  }
}

function fallbackCopy(btn, text) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
  document.body.removeChild(textarea);
}

function showCopied(btn) {
  btn.classList.add('copied');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已複製';
  setTimeout(function() {
    btn.classList.remove('copied');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 複製';
  }, 1800);
}

// ═══════════════ MERMAID ═══════════════
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  securityLevel: 'loose',
  flowchart: { useMaxWidth: true, htmlLabels: true },
  sequence: { useMaxWidth: true },
  gantt: { useMaxWidth: true }
});

async function renderMermaidDiagrams() {
  const mermaidEls = contentEl.querySelectorAll('.mermaid');
  for (const el of mermaidEls) {
    try {
      const code = el.textContent;
      const id = el.id || 'mermaid-' + Math.random().toString(36).substr(2, 9);
      // Set container width BEFORE render so mermaid uses it for layout
      el.style.maxWidth = '820px';
      el.style.margin = '12px auto';
      const { svg } = await mermaid.render(id + '-svg', code);
      el.innerHTML = svg;

      // Fix text clipping: remove overflow:hidden from foreignObjects
      const svgEl = el.querySelector('svg');
      if (svgEl) {
        svgEl.querySelectorAll('foreignObject').forEach(function(fo) {
          fo.setAttribute('overflow', 'visible');
          fo.style.overflow = 'visible';
          var div = fo.querySelector('div');
          if (div) {
            div.style.overflow = 'visible';
          }
        });
      }
    } catch (err) {
      el.innerHTML = '<p style="color:red;">⚠️ Mermaid 圖表渲染失敗：' + escapeHTML(err.message) + '</p>';
    }
  }
}

// ═══════════════ INIT ═══════════════
buildTOC();

// Detect file:// protocol on load and show warning banner
if (window.location.protocol === 'file:') {
  document.getElementById('file-warning').style.display = 'block';
}

// Handle quick links in welcome
document.querySelectorAll('[data-file]').forEach(el => {
  if (el.closest('#toc')) return; // skip TOC items (already handled)
  el.addEventListener('click', (e) => {
    e.preventDefault();
    loadDoc(el.dataset.file, el.textContent);
  });
});
